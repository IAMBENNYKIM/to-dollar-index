# 일일 종가 수집 배치
# KIS 도메인은 KIS_IS_MOCK(true/false) 또는 KIS_BASE_URL 중 하나로 정한다.
#   - 모의투자: Secret KIS_IS_MOCK=True (KIS_BASE_URL 불필요)
#   - 실전투자: Secret KIS_BASE_URL=https://openapi.koreainvestment.com:9443
name: daily-collect

on:
  schedule:
    # UTC 10:00 = KST 19:00, 평일(월~금)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: collector/pyproject.toml

      - name: Install collector
        run: pip install -e ./collector

      - name: Run daily collect
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_IS_MOCK: ${{ secrets.KIS_IS_MOCK }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COLLECT_FAILURE_SUMMARY_FILE: ${{ runner.temp }}/collect-failures.txt
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            echo "월요일: 부동산 포함 전체 수집"
            python -m collector.main daily
          else
            echo "화~금: 부동산 제외 수집(부동산은 주 1회 월요일에만)"
            python -m collector.main daily --skip-real-estate
          fi

      - name: 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿이 없어 알림을 건너뜁니다."
            exit 0
          fi
          SUMMARY_FILE="${{ runner.temp }}/collect-failures.txt"
          FAILURE_DETAIL=""
          if [ -f "$SUMMARY_FILE" ]; then
            FAILURE_DETAIL="$(cat "$SUMMARY_FILE")"
          fi
          MESSAGE_TEXT="❌ ${{ github.workflow }} 실패
          실패 지표:
          ${FAILURE_DETAIL}
          실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS --fail-with-body "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE_TEXT}"
