# 월간 전체 재백필 (수정주가 basis drift 대응) + keepalive heartbeat
# GitHub 60일 비활성 스케줄 정지 / Supabase 7일 무활동 정지 방지
# KIS 도메인은 KIS_IS_MOCK(모의: True) 또는 KIS_BASE_URL(실전 도메인) 중 하나로 정한다.
name: monthly-rebackfill

on:
  schedule:
    # UTC 10:00, 매월 1일
    - cron: '0 10 1 * *'
  workflow_dispatch:
    inputs:
      from_date:
        description: '재백필 시작일 (YYYY-MM-DD)'
        required: false
        default: '2015-01-01'

jobs:
  rebackfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: collector/pyproject.toml

      - name: Install collector
        run: pip install -e ./collector

      - name: Run full rebackfill
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_IS_MOCK: ${{ secrets.KIS_IS_MOCK }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FROM_DATE: ${{ github.event.inputs.from_date || '2015-01-01' }}
        run: python -m collector.main backfill --from "$FROM_DATE"

      - name: Keepalive heartbeat
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-rebackfill.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-rebackfill.txt
          git diff --staged --quiet || git commit -m "chore: 월간 재백필 heartbeat"
          git push

      - name: 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿이 없어 알림을 건너뜁니다."
            exit 0
          fi
          curl -sS --fail-with-body "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="❌ ${{ github.workflow }} 실패
          실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
