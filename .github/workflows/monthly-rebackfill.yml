# 월간 전체 재백필 (수정주가 basis drift 대응) + keepalive heartbeat
# GitHub 60일 비활성 스케줄 정지 / Supabase 7일 무활동 정지 방지
# KIS_BASE_URL 실전 도메인 값: https://openapi.koreainvestment.com:9443
name: monthly-rebackfill

on:
  schedule:
    # UTC 10:00, 매월 1일
    - cron: '0 10 1 * *'
  workflow_dispatch:
    inputs:
      from_date:
        description: '재백필 시작일 (YYYY-MM-DD)'
        required: false
        default: '2015-01-01'

jobs:
  rebackfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: collector/pyproject.toml

      - name: Install collector
        run: pip install -e ./collector

      - name: Run full rebackfill
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m collector.main backfill --from ${{ github.event.inputs.from_date || '2015-01-01' }}

      - name: Keepalive heartbeat
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-rebackfill.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-rebackfill.txt
          git diff --staged --quiet || git commit -m "chore: 월간 재백필 heartbeat"
          git push
